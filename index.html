<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone - Viniccius13</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://kit.fontawesome.com/6e5c21ee73.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-left">
            <button class="menu-icon"><i class="fa-solid fa-bars"></i></button>
            <div class="logo-container">
                <div class="logo-link">
                    <img src="images/YoutubeDarkLogo.png" alt="YouTube">
                    <span class="country">BR</span>
                </div>
            </div>
        </div>

        <div class="header-center">
            <div class="search-box">
                <div class="input-wrapper">
                    <input type="text" placeholder="Pesquisar">
                    <i class="bi bi-keyboard"></i>
                    <i class="bi bi-x-lg"></i>
                </div>
                <button class="search-btn"><i class="bi bi-search"></i></button>
            </div>
            <button class="mic-btn"><i class="bi bi-mic-fill"></i></button>
        </div>

        <div class="header-right">
            <button class="create-btn"><i class="bi bi-plus-lg"></i> Criar</button>
            <div class="notification-icon">
                <i class="fa-solid fa-bell"></i>
                <span class="badge">9+</span>
            </div>
            <img src="images/Profile.png" class="user-avatar" alt="Avatar">
        </div>
    </header>

    <main class="channel-layout">
        <section class="banner">
            <img src="images/ChannelBanner.png" alt="Banner Viniccius13">
        </section>

        <section class="channel-info">
            <div class="profile-pic">
                <img src="images/ChannelPfp.png" alt="Viniccius13">
            </div>
            <div class="channel-details">
                <h1>viniccius13 <i class="bi bi-check-circle-fill"></i></h1>
                <p><span class="channel-handle">@viniccius13</span> • 6,41 mi de inscritos • 559 vídeos</p>
                <p class="description">Gosto de fazer farms e algumas loucuras. <span class="expand-description">...mais</span></p>
                <div class="links-row">
                    <a href="http://instagram.com/viniccius13" class="instagram-link">instagram.com/viniccius13</a> 
                    <span class="expand-links">e mais 1 link</span>
                </div>
                <div class="buttons-row">
                    <button class="subscribe-btn"><i class="bi bi-bell"></i> Inscrito <i class="bi bi-chevron-down"></i></button>
                    <button class="member-btn">
                        <div class="star-circle"><i class="bi bi-star-fill"></i></div> Seja membro
                    </button>
                </div>
            </div>
        </section>

        <nav class="channel-nav">
            <a href="#" class="active">Início</a>
            <a href="#">Vídeos</a>
            <a href="#">Playlists</a>
            <a href="#">Posts</a>
            <i class="bi bi-search"></i>
        </nav>

        <section class="video-grid">
            </section>
    </main>
</body>
</html>
