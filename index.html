<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/6e5c21ee73.js" crossorigin="anonymous"></script>

</head>
<body>
    <header>
            <div class="header-left">
                <button id="menu-button" class="header-buttons">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <a href="" id="logo" class="header-button-logo">
                        <img src="images/YoutubeDarkLogo.png" alt="">
                    </a>

            </div>
            <div class="header-center">
            <div class="search-bar">
                <form action="/search" class="search-form">
                    <input type="text" placeholder="Pesquisar" name="search">
                    <button type="submit" class="search-button">
                        <i class="fa-solid fa-magnifying-glass"></i> 
                    </button>
                </form>
            </div>
                <button class="mic-button">
                    <i class="fa-solid fa-microphone"></i>
                </button>
            </div>
            <div class="header-right">
                <button type="button" id="record-button" class="header-buttons">
                    <i class="fa-solid fa-video"></i>
                </button>
                <button type="button" id="grid-button" class="header-buttons">
                    <i class="fa-solid fa-grip-vertical"></i>
                </button>
                <button type="button" id="notifications-button" class="header-buttons">
                    <i class="fa-solid fa-bell"></i>
                </button>
                <button type="button" id="profile-button">
                    <img src="images/Profile.png" alt="" class="profile-img">
                </button>
            </div>
    </header>
</body>
</html>
